# frontend/cloudbuild.yaml
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/carbonsense-repo/carbonsense-frontend:latest', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/carbonsense-repo/carbonsense-frontend:latest']
images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/carbonsense-repo/carbonsense-frontend:latest'
